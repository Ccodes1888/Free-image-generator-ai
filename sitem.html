<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
            text-align: center;
        }
        input[type="text"] {
            width: 60%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
        #result img {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #result p {
            margin-top: 20px;
            color: red;
        }
    </style>
</head>
<body>

    <h1>AI Image Generator</h1>
    <p>Enter a prompt to generate an image:</p>
    
    <input type="text" id="promptInput" placeholder="E.g., A cute robot in a forest">
    <button onclick="generateImage()">Generate</button>

    <div id="result"></div>

    <script>
        const BACKEND_URL = 'https://node64.lunes.host:3137'; // <-- your public backend

        async function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            const resultDiv = document.getElementById('result');

            if (!prompt) {
                resultDiv.innerHTML = "<p>Please enter a prompt.</p>";
                return;
            }

            resultDiv.innerHTML = "<p>Generating image...</p>";

            try {
                const response = await fetch(`${BACKEND_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();

                if (data.data && data.data[0].url) {
                    resultDiv.innerHTML = `<img src="${data.data[0].url}" alt="Generated Image">`;
                } else if (data.error) {
                    resultDiv.innerHTML = `<p>Error: ${JSON.stringify(data.error)}</p>`;
                } else {
                    resultDiv.innerHTML = "<p>Unknown error occurred.</p>";
                }

            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = "<p>Failed to generate image. Check console for details.</p>";
            }
        }
    </script>

</body>
</html>
